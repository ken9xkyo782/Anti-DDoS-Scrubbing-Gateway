services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: control_plane_test
      POSTGRES_USER: control_plane
      POSTGRES_PASSWORD: control_plane
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U control_plane -d control_plane_test"]
      interval: 2s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20
